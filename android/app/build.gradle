plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def env = System.getenv()

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def readSigningValue = { String envKey, String propKey ->
    def envValue = env[envKey]
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }

    def propValue = keystoreProperties.getProperty(propKey)
    if (propValue != null && propValue.trim()) {
        return propValue.trim()
    }

    return null
}

def releaseStoreFile = readSigningValue("BOTANICA_ANDROID_KEYSTORE_PATH", "storeFile")
        ?: readSigningValue("ANDROID_KEYSTORE_PATH", "storeFile")
def releaseStorePassword =
        readSigningValue("BOTANICA_ANDROID_KEYSTORE_PASSWORD", "storePassword")
                ?: readSigningValue("ANDROID_KEYSTORE_PASSWORD", "storePassword")
def releaseKeyAlias = readSigningValue("BOTANICA_ANDROID_KEY_ALIAS", "keyAlias")
        ?: readSigningValue("ANDROID_KEY_ALIAS", "keyAlias")
def releaseKeyPassword = readSigningValue("BOTANICA_ANDROID_KEY_PASSWORD", "keyPassword")
        ?: readSigningValue("ANDROID_KEY_PASSWORD", "keyPassword")

def releaseStoreFileHandle =
        releaseStoreFile ? rootProject.file(releaseStoreFile) : null

def hasReleaseSigning = releaseStoreFileHandle != null &&
        releaseStoreFileHandle.exists() &&
        releaseStorePassword &&
        releaseKeyAlias &&
        releaseKeyPassword

def requireReleaseSigning =
        (env["BOTANICA_REQUIRE_RELEASE_SIGNING"] ?: "false").toBoolean()

android {
    namespace = "com.botanica.botanica"
    // Some plugins (e.g. flutter_local_notifications) now require compiling
    // against Android SDK 35+ even for debug builds.
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.botanica.botanica"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile releaseStoreFileHandle
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            } else {
                if (requireReleaseSigning) {
                    throw new GradleException(
                            "Release signing is required but not configured.\n" +
                                    "See docs/release.md for setup instructions."
                    )
                }

                // Keep local release builds reproducible without secrets, but
                // make it obvious this is not Play Store uploadable.
                logger.lifecycle(
                        "Release signing not configured; using debug keystore. " +
                                "See docs/release.md to configure a real release key."
                )
                signingConfig = signingConfigs.debug
            }
        }
    }
}

flutter {
    source = "../.."
}
