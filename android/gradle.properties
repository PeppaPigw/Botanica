org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError

# Some environments pin Gradle HTTPS to TLSv1.2 via ~/.gradle/gradle.properties.
# Maven Central and other repos may require TLSv1.3, which breaks dependency
# resolution during release builds. Allow both TLSv1.3 and TLSv1.2.
systemProp.https.protocols=TLSv1.3,TLSv1.2
android.useAndroidX=true
android.enableJetifier=true
