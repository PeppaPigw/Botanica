name: Feature request
description: Suggest an idea or improvement for Botanica
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose an improvement!

        Please avoid posting sensitive data (credentials, private URLs, etc.).

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: It's hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: Add a button to ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have considered?
      placeholder: Another way could be ...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Mockups, links, references, etc.
      placeholder: Screenshots or references...
    validations:
      required: false
